name: Setup GCC Toolchain
description: Download and configure a GCC cross-compilation toolchain for use in CI workflows
author: Jan Macheta

branding:
  icon: cpu
  color: black

inputs:
  toolchain:
    description: >
      Toolchain variant to install. Available: arm-none-eabi, aarch64-none-elf,
      arm-none-linux-gnueabihf, aarch64-none-linux-gnu,
      riscv-none-elf, xtensa-esp-elf, riscv32-esp-elf, avr
    required: true
  vendor:
    description: >
      Toolchain vendor to use when multiple vendors provide the same toolchain name
      (e.g. "xpack" or "arm" for arm-none-eabi). Optional — omit to use the first
      available vendor; an error is raised if the requested version is ambiguous.
    required: false
    default: ""
  version:
    description: >
      Toolchain version to install (e.g. "15.2.1-1.1" for xPack, "esp-14.2.0_20241119"
      for Espressif, "14.1.0" for ZakKemble AVR). Use "latest" or omit to install the
      newest available version.
    required: false
    default: "latest"
  enable-cache:
    description: Cache the downloaded toolchain archive to speed up subsequent runs
    required: false
    default: "true"
  set-ld-library-path:
    description: >
      Prepend the toolchain's lib/lib64 directory to LD_LIBRARY_PATH so binaries
      built with it link against its bundled libstdc++/libgcc at runtime instead
      of an older system one (avoids "GLIBCXX_x.y.z not found" errors). Set to
      "false" to leave LD_LIBRARY_PATH untouched.
    required: false
    default: "true"

outputs:
  toolchain-path:
    description: Path to the installed toolchain root directory
  cache-hit:
    description: Whether the toolchain was restored from cache

runs:
  using: node24
  main: dist/index.js
