# GCC Toolchain Database — macOS Apple Silicon (arm64) runner
# Structure: vendor -> toolchain -> version -> {url, sha256}
# Sources (macOS support confirmed by checking vendor release assets):
#   arm:        https://gitlab.arm.com/tooling/gnu-toolchains-for-arm (arm64 darwin only, bare-metal targets only)
#   xpack:      https://github.com/xpack-dev-tools
#   espressif:  https://github.com/espressif/crosstool-NG
#
# Not included — no macOS release assets found for these vendors as of this writing:
#   zakkemble (avr-gcc-build): linux/windows only
#   winlibs: windows only (mingw host tool)
#   arm bare-metal Linux-glibc targets (arm-none-linux-gnueabihf, aarch64-none-linux-gnu): no darwin asset published

platform: darwin-arm64

arm:

  arm-none-eabi:
    description: ARM bare-metal (Cortex-M/R, no OS) — official ARM Ltd release
    versions:
      "15.2.rel1":
